_base_: base.yaml

# Sparse-view 3DGS baseline on LLFF (Mildenhall 2019), single scene "fern".
#
# Protocol (RegNeRF / FreeNeRF / SparseGS standard):
#   * test  = every 8th view
#   * train = 3 uniformly-spaced views from the remaining 7/8
#
# Depth prior: Depth-Anything-V2-Small (HF) precomputed via
#   python scripts/precompute_depth.py --dataset llff --scene fern \
#       --data-root data/nerf_llff_data --image-downsample 4 \
#       --backend transformers --tag depth_anything_v2_small_hf

experiment:
  name: llff_fern_n3_dav2s

data:
  type: llff
  root: data/nerf_llff_data
  scene: fern
  n_train_views: 3
  train_view_ids: null            # null -> uniform pick from non-test pool
  image_downsample: 4             # uses LLFF's pre-downsampled images_4/
  white_background: false         # LLFF is a real photo; no compositing
  recenter: true
  rescale: true
  sparse_mode: uniform
  depth_prior:
    enabled: true
    backend: cache
    tag: depth_anything_v2_small_hf
    kind: disparity
    required: false               # train even if a few cache files missing

model:
  sh_degree: 3
  init:
    type: random_in_box
    # LLFF after rescale has bounds ~ (1.33, ~10+). Recenter puts the avg
    # camera at the origin; the scene lives in front of the cameras
    # (OpenGL -z direction). The simple symmetric box is wasteful but
    # still works: gsplat's DefaultStrategy will prune empty regions
    # in the first few hundred iterations.
    num_points: 200000
    extent: 4.0
    rgb_init: 0.5
  scale_init_factor: 0.02         # slightly larger init scale for real scenes

renderer:
  near_plane: 0.01
  far_plane: 1.0e10
  rasterize_mode: antialiased
  packed: false
  absgrad: true
  render_mode: RGB+ED

# Densification: hard-cap N to keep single-rasterization kernel time bounded.
# On Windows + 5090 driver, runs without ``cap_max`` repeatedly hit
# transient GPU resets (TDR) at N >= ~400K with HxW = 756x1008. ~250K is a
# safe ceiling that still leaves enough capacity for sparse-view fitting on
# fern. Slightly raise grow_grad2d to make growth more conservative.
strategy:
  cap_max: 250000
  grow_grad2d: 0.00025
  refine_stop_iter: 6000

train:
  iterations: 7000
  ssim_lambda: 0.2

ssl:
  # Stage-C SSL terms: ON, mirrors the lego sparse-view recipe.
  multiview_photo:
    enabled: true
    weight: 0.10
    start_iter: 1500
    n_neighbors: 1
    # No alpha mask on real data -> threshold turned off.
    alpha_thresh: 0.0
    ssim_lambda: 0.0
    depth_eps: 0.001
    occlusion_check: true
    occlusion_start_iter: 3000
    occlusion_tau: 0.10
    occlusion_alpha_thresh: 0.0

  depth_consist:
    enabled: true
    weight: 0.05
    start_iter: 500
    alpha_thresh: 0.0               # no alpha on LLFF
    space: disparity
    depth_eps: 0.001

  ema_teacher:     {enabled: false, weight: 0.0}
  pseudo_view:     {enabled: false, weight: 0.0}
  feature:         {enabled: false, weight: 0.0}

eval:
  render_test_at_end: true
  num_test_renders: null            # all 3 test views (LLFF/fern has ~3-4)
  lpips: true
  lpips_net: vgg
