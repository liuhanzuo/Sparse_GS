_base_: base.yaml

experiment:
  name: lego_n6_ssl_mv_v3

data:
  scene: lego
  n_train_views: 6

train:
  iterations: 7000
  ssim_lambda: 0.2

# v3: multiview_photo + *sparse-view-friendly* occlusion check.
#
# Findings from v2 (see PROJECT_STATUS §3 / TB kept_ratio logs):
#   n=6: kept_ratio mean = 0.48  (check drops ~half pixels)   → PSNR +0.78 dB
#   n=3: kept_ratio mean = 0.37  (check drops ~two-thirds)    → PSNR  ±0.00 dB
#                                                              (vs baseline, i.e. lost
#                                                               the +0.9 dB that v1
#                                                               already achieved)
#
# Diagnosis. When n_views is very small (≤3), the student's depth is too
# noisy at start_iter = 1500 to serve as a trustworthy occlusion oracle.
# The check over-rejects real-but-hard correspondences and the net SSL
# signal collapses (coverage = 0.096 in v2 at n=3).
#
# Fix. Two-stage gating, both configurable:
#   1. occlusion_start_iter = 3000  — let SSL run unfiltered for the first
#      1500 iters of its active life, so geometry can stabilise before we
#      start gating on its own depth.
#   2. occlusion_tau = 0.10         — 2× looser tolerance (10% relative
#      depth disagreement); still catches gross occlusion, stops biting
#      into legitimate multi-view correspondences.
#   3. occlusion_alpha_thresh = 0.3 — accept cam_b coverage down to 30 %
#      alpha (was 50 %). At wide baselines cam_b often only partly sees
#      the reprojection site; 50 % was throwing those out.
ssl:
  multiview_photo:
    enabled: true
    weight: 0.10
    start_iter: 1500
    n_neighbors: 1
    alpha_thresh: 0.5
    ssim_lambda: 0.0
    depth_eps: 0.001
    # --- new in v2 ---
    occlusion_check: true
    # --- loosened in v3 for sparse-view regimes ---
    occlusion_start_iter: 3000
    occlusion_tau: 0.10
    occlusion_alpha_thresh: 0.3

  ema_teacher:     {enabled: false, weight: 0.0}
  pseudo_view:     {enabled: false, weight: 0.0}
  depth_consist:   {enabled: false, weight: 0.0}
  feature:         {enabled: false, weight: 0.0}
