_base_: ../_blender_n8/blender_chair_n8_dav2s.yaml

# Full PatchGAN trial: adversarial loss is allowed to update geometry too.
# This is intentionally stronger than gan_small: no detach, every step, higher weight.
experiment:
  name: blender_chair_n8_ssl_mv_dav2s_gan_full

ssl:
  patch_gan:
    enabled: true
    weight: 0.005
    start_iter: 3000
    every: 1
    patch_size: 128
    base_channels: 32
    max_channels: 256
    n_layers: 3
    spectral_norm: true
    lr: 0.0002
    beta1: 0.0
    beta2: 0.99
    detach_geometry: false
    augment: true
    loss: hinge
