_base_: ../_blender_n8/blender_drums_n8_dav2s.yaml

# Conservative appearance-only PatchGAN trial on a difficult thin-structure scene.
experiment:
  name: blender_drums_n8_ssl_mv_dav2s_gan_small

ssl:
  patch_gan:
    enabled: true
    weight: 0.002
    start_iter: 4000
    every: 4
    patch_size: 128
    base_channels: 32
    max_channels: 256
    n_layers: 3
    spectral_norm: true
    lr: 0.0002
    beta1: 0.0
    beta2: 0.99
    detach_geometry: true
    augment: true
    loss: hinge
