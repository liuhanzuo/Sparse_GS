_base_: base.yaml

# Smoke-test config for the new depth_consist SSL loss.
# Uses the synthetic _mini scene (4 ring cameras, 1500 iters) and the
# alpha-derived pseudo-disparity prior. This validates that:
#  - data.depth_prior.backend=alpha attaches mono_depth correctly,
#  - the new ssl.depth_consist loss runs without NaNs,
#  - it actually contributes a non-zero gradient.

experiment:
  name: _smoke_depth

data:
  scene: _mini
  n_train_views: 4
  image_downsample: 1
  depth_prior:
    enabled: true
    backend: alpha
    kind: disparity
    bg_value: 0.0

model:
  init:
    num_points: 20000
    extent: 1.0

train:
  iterations: 600
  log_every: 100
  eval_every: 600
  save_every: 600
  ssim_lambda: 0.2

strategy:
  refine_start_iter: 200
  refine_stop_iter: 500
  reset_every: 600
  refine_every: 100

ssl:
  multiview_photo: {enabled: false, weight: 0.0}
  depth_consist:
    enabled: true
    weight: 0.05
    start_iter: 50
    alpha_thresh: 0.5
    space: disparity
    depth_eps: 0.001
  ema_teacher: {enabled: false, weight: 0.0}
  pseudo_view: {enabled: false, weight: 0.0}
  feature: {enabled: false, weight: 0.0}

eval:
  num_test_renders: 4
  lpips: false
