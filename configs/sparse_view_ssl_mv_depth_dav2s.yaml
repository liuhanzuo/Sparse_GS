_base_: base.yaml

# Variant of sparse_view_ssl_mv_depth.yaml that uses a *real* monocular
# depth prior — Depth-Anything-V2-Small precomputed via
# ``scripts/precompute_depth.py --backend transformers
#   --model models/depth_anything_v2_small --tag depth_anything_v2_small``.
#
# Compared to the alpha-disparity variant, this gives the model an
# actual disparity field inside the foreground silhouette (not just
# binary fg/bg), so depth_consist can shape geometry rather than only
# pin opacity to the alpha matte.

experiment:
  name: lego_n9_ssl_mv_dav2s

data:
  scene: lego
  n_train_views: 9
  depth_prior:
    enabled: true
    backend: cache
    tag: depth_anything_v2_small
    kind: disparity
    required: false                # still trains if some npz are missing

train:
  iterations: 7000
  ssim_lambda: 0.2

ssl:
  multiview_photo:
    enabled: true
    weight: 0.10
    start_iter: 1500
    n_neighbors: 1
    alpha_thresh: 0.5
    ssim_lambda: 0.0
    depth_eps: 0.001
    occlusion_check: true
    occlusion_start_iter: 3000
    occlusion_tau: 0.10
    occlusion_alpha_thresh: 0.3

  depth_consist:
    enabled: true
    weight: 0.05                   # match alpha-baseline for fair compare
    start_iter: 500
    alpha_thresh: 0.5
    space: disparity               # SSI in disparity (DepthAnything output)
    depth_eps: 0.001

  ema_teacher:     {enabled: false, weight: 0.0}
  pseudo_view:     {enabled: false, weight: 0.0}
  feature:         {enabled: false, weight: 0.0}
