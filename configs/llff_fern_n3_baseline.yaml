_base_: base.yaml

# Pure 3DGS baseline on LLFF/fern, sparse-view (N=3). NO SSL terms.
# Use this first to validate the LLFF dataloader, intrinsics, pose
# convention, and the strategy/optimizer plumbing on a real scene.
# Once this trains to a reasonable PSNR (>17 on N=3 fern is typical for
# vanilla 3DGS), enable SSL via the *_dav2s.yaml variant.

experiment:
  name: llff_fern_n3_baseline

data:
  type: llff
  root: data/nerf_llff_data
  scene: fern
  n_train_views: 3
  train_view_ids: null
  image_downsample: 4
  white_background: false
  recenter: true
  rescale: true
  sparse_mode: uniform

model:
  sh_degree: 3
  init:
    type: random_in_box
    num_points: 200000
    extent: 4.0
    rgb_init: 0.5
  scale_init_factor: 0.02

renderer:
  near_plane: 0.01
  far_plane: 1.0e10
  rasterize_mode: antialiased
  packed: false
  absgrad: true
  render_mode: RGB+ED

train:
  iterations: 7000
  ssim_lambda: 0.2

# All SSL disabled.
ssl:
  multiview_photo: {enabled: false, weight: 0.0}
  depth_consist:   {enabled: false, weight: 0.0}
  ema_teacher:     {enabled: false, weight: 0.0}
  pseudo_view:     {enabled: false, weight: 0.0}
  feature:         {enabled: false, weight: 0.0}

eval:
  render_test_at_end: true
  num_test_renders: null
  lpips: true
  lpips_net: vgg
