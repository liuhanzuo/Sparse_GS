_base_: ../base.yaml

# Blender avg-8 sweep, scene = hotdog, n=8 baseline.
# Auto-generated by scripts/_gen_blender_n8_configs.py — do not edit by hand.

experiment:
  name: blender_hotdog_n8

data:
  type: nerf_synthetic
  root: D:\SSL\sparse_gs\data\nerf_synthetic
  scene: hotdog
  n_train_views: 8
  train_view_ids: null
  image_downsample: 1
  white_background: true

model:
  sh_degree: 3
  init:
    type: random_in_box
    num_points: 100000
    extent: 1.5
    rgb_init: 0.5
  scale_init_factor: 0.01

renderer:
  near_plane: 0.01
  far_plane: 1.0e10
  rasterize_mode: antialiased
  packed: false
  absgrad: true
  render_mode: RGB+ED

strategy:
  type: default
  prune_opa: 0.005
  grow_grad2d: 0.0002
  grow_scale3d: 0.01
  prune_scale3d: 0.1
  refine_start_iter: 500
  refine_stop_iter: 15000
  refine_every: 100
  reset_every: 3000
  absgrad: true
  revised_opacity: false
  verbose: false

train:
  iterations: 7000
  ssim_lambda: 0.2

ssl:
  multiview_photo: {enabled: false, weight: 0.0}
  depth_consist:   {enabled: false, weight: 0.0}
  ema_teacher:     {enabled: false, weight: 0.0}
  pseudo_view:     {enabled: false, weight: 0.0}
  feature:         {enabled: false, weight: 0.0}

eval:
  render_test_at_end: true
  num_test_renders: 200
  lpips: true
  lpips_net: vgg
