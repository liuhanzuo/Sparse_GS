_base_: base.yaml

# Smoke-test for the new SparseSurf-style geometric priors:
#   surface_flatten   — pushes Gaussian aspect ratio toward 0 (surfels)
#   normal_smooth     — TV on depth-derived per-pixel normals
#
# Uses the synthetic _mini scene (4 ring cameras). Validates:
#   - both losses run without NaNs / shape errors
#   - they do *not* destabilise the photo loss when active early
#   - log dict carries the expected diagnostic keys

experiment:
  name: _smoke_surface

data:
  scene: _mini
  n_train_views: 4
  image_downsample: 1

model:
  init:
    num_points: 20000
    extent: 1.0

train:
  iterations: 600
  log_every: 100
  eval_every: 600
  save_every: 600
  ssim_lambda: 0.2

strategy:
  refine_start_iter: 200
  refine_stop_iter: 500
  reset_every: 600
  refine_every: 100

ssl:
  multiview_photo: {enabled: false, weight: 0.0}
  depth_consist:   {enabled: false, weight: 0.0}
  ema_teacher:     {enabled: false, weight: 0.0}
  pseudo_view:     {enabled: false, weight: 0.0}
  feature:         {enabled: false, weight: 0.0}

  surface_flatten:
    enabled: true
    weight: 0.01
    start_iter: 100
    mode: ratio
    opacity_thresh: 0.0

  normal_smooth:
    enabled: true
    weight: 0.02
    start_iter: 150
    alpha_thresh: 0.5
    depth_eps: 0.001
    edge_aware: true
    edge_lambda: 10.0

eval:
  num_test_renders: 4
  lpips: false
