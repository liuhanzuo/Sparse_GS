_base_: ./blender_hotdog_n8_w3_aggrprune_long_v6_pgan70_x45k.yaml

experiment:
  name: blender_hotdog_n8_w3_aggrprune_long_v7_widerpseudo_x45k

# W3-aggrprune-long_v7_widerpseudo_x45k (hotdog)
# ============================================================
# 目的：在 x45k (PSNR=25.8954, SSIM=0.9367, LPIPS=0.1057) 的基础上
# 进一步缩小 val/test gap (val~27.x vs test 25.9, gap~1+ dB)。
# gap 的本质来源：test 集 200 张视角分布比 val 集 100 张更广，
# 训练 8 视图 + 现有 pseudo 采样范围对 test 视角覆盖不足。
#
# 改动（相对 x45k 严格只差 5 个值，其余完全继承）：
#   pseudo.wide_sampling.elevation_margin_deg: 10.0  -> 20.0
#   pseudo.wide_sampling.extrap_t_range:  [-0.3,1.3] -> [-0.5,1.5]
#   pseudo.wide_sampling.radius_jitter:        0.05  -> 0.10
#   pseudo.wide_sampling.mode_probs: [0.4,0.3,0.3]   -> [0.3,0.3,0.4]
#   ssl.pvd.weight:                          5.0e-3  -> 1.2e-2
#
# 设计逻辑：
#   1) 三个 wide_sampling 参数同时放宽，让 SSL/co-reg/PVD 看到的
#      pseudo 视角真正覆盖到 test 集分布（更高仰角、更外推、更
#      多半径变化），直接打 val→test gap 的根因；
#   2) PVD weight ×2.4，配合更广的 pseudo 视角，对 LPIPS（你的
#      相对短板：0.1057）施加更强的感知监督。GAN 在 pseudo 视角
#      的对抗信号是 dual-GS 之外唯一能在"未见视角"上提供纹理级
#      监督的通道，先前 5e-3 偏保守。
#
# 风险点：
#   - radius_jitter 0.10 + extrap [-0.5,1.5] 会出现明显远离物体的
#     pseudo 相机，若 floater_guidance 误判会拉出新 floater。
#     缓解：co-prune 已在 step 3600 起每 1200 步运行；GAN guidance
#     gate_thresh=0.6 也仍生效。
#   - PVD weight 1.2e-2 偏激进。若训练曲线出现震荡，回退到 8e-3。
#
# 训练预算：与 x45k 完全一致，~95 分钟（45000 步 + 14 个 snapshot）。
# 对比 baseline：x45k 的 metrics.json (test/psnr=25.8954)。
# ============================================================

pseudo:
  wide_sampling:
    mode_probs: [0.3, 0.3, 0.4]
    extrap_t_range: [-0.5, 1.5]
    elevation_margin_deg: 20.0
    radius_jitter: 0.10

ssl:
  pvd:
    weight: 1.2e-2
