_base_: ../_w3_dual_gs/blender_drums_n8_w3_dual_gs.yaml

experiment:
  name: blender_drums_n8_w3_aggrprune_long_v3

# W3-aggrprune-long_v3 (drums)
#
# 现状：drums 是当前 8 个场景中 PSNR 最低的之一（w3_aggrprune final = 15.40）。
# drums 几何复杂（鼓皮+鼓架+镲片），floater 多且与真实薄结构难分。
# 假设：长程训练 + 早 prune + 晚恢复 + linear-decay thresh_bin 同样适用。
#
# 与 hotdog v3 共用同一套 schedule（已在 hotdog 上验证 peak=26.6）。

train:
  iterations: 15000

strategy:
  refine_start_iter: 500
  refine_stop_iter: 12000
  prune:
    unseen:
      enabled: true
      start_iter: 2000
      every_iter: 3000
      stop_iter: 11500
    floater:
      enabled: true
      start_iter: 4000
      every_iter: 2500
      stop_iter: 11500
      alpha_thresh: 0.5
      thresh_bin: 0.05
      thresh_bin_end: 0.01
      thresh_bin_decay_start: 4000
      thresh_bin_decay_end: 11500
      safety_max_ratio: 0.25

dual_gs:
  coprune: true
  coprune_threshold: 0.05
  coprune_start_iter: 1500
  coprune_stop_iter: 11500
  coprune_every_iter: 500
  safety_max_ratio: 0.20
  end_sample_pseudo: 15000
