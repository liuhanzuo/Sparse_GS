_base_: ../_w3_dual_gs/blender_drums_n8_w3_dual_gs.yaml

experiment:
  name: blender_drums_n8_w3_aggrprune

# W3-aggrprune: 仅针对 floater 病灶场景（drums / materials / hotdog / ship）
# 调强两条剪枝通道，其余沿用原 W3 dual-GS。
#  1) SparseGS-style floater-prune 的安全阀：0.08 -> 0.25
#     诊断结果显示 drums 在 step=4000 候选 ratio=0.207，被原 0.08 阈值
#     全部跳过；放宽到 0.25 可让该剪枝真正动手清理白底 floater。
#  2) CoR-GS 风格 co-prune disagreement 阈值：0.10 -> 0.05
#     更敏感地捕捉两套独立 GS 的颜色不一致点（典型 floater 特征）。
#  3) co-prune 安全阀同步放宽：0.10 -> 0.20，避免误触发 skip。
strategy:
  prune:
    floater:
      safety_max_ratio: 0.25

dual_gs:
  coprune_threshold: 0.05
  safety_max_ratio: 0.20
