_base_: ./blender_chair_n8_w3_aggrprune_long_v6_pgan70.yaml

experiment:
  name: blender_chair_n8_w3_aggrprune_long_v7_widerpseudo_x60k

# W3-aggrprune-long_v7_widerpseudo_x60k (chair)
# ============================================================
# 把 hotdog 上验证有效的 v7 配方 (PSNR 25.90 -> 26.40, +0.50 dB)
# 应用到 chair, 并把训练步数从 45k 提到 60k 让模型充分收敛。
# v7 在 hotdog x45k 收敛曲线最后 1500 步还涨 0.08 dB, 没收敛,
# 预计 60k 还能涨 0.2-0.4 dB。
# 时间锚点按 ×4/3 等比例放大。
# ============================================================

train:
  iterations: 60000
  periodic_ckpt_every: 1500
  periodic_ckpt_start: 48000
  save_pre_prune_ckpt: true

strategy:
  refine_start_iter: 1200
  refine_stop_iter: 38400
  prune:
    unseen:
      enabled: true
      start_iter: 4800
      every_iter: 7200
      stop_iter: 36800
    floater:
      enabled: true
      start_iter: 9600
      every_iter: 6000
      stop_iter: 36800
      alpha_thresh: 0.5
      thresh_bin: 0.05
      thresh_bin_end: 0.01
      thresh_bin_decay_start: 9600
      thresh_bin_decay_end: 36800
      safety_max_ratio: 0.25

dual_gs:
  coprune: true
  coprune_threshold: 0.05
  coprune_start_iter: 3600
  coprune_stop_iter: 36800
  coprune_every_iter: 1200
  safety_max_ratio: 0.20
  end_sample_pseudo: 60000

pseudo:
  wide_sampling:
    mode_probs: [0.3, 0.3, 0.4]
    extrap_t_range: [-0.5, 1.5]
    elevation_margin_deg: 20.0
    radius_jitter: 0.10

ssl:
  pvd:
    enabled: true
    start_iter: 4800
    weight: 1.2e-2
    floater_guidance:
      warmup_iter: 19200
