_base_: ../blender_ship_n8_w3_aggrprune_long_v7_widerpseudo_x45k.yaml

experiment:
  name: blender_ship_n8_v8_hard_x45k

# W3-aggrprune-long_v8_hard_x45k (ship)
# ============================================================
# v8_hard 配方：在 v7_widerpseudo_x45k 基础上，针对 ship/materials/drums
# 这种 v7 无法收敛 (ship/materials/drums final_psnr ≤ 19.0) 的"难场景"
# 引入 4 项联合改动：
#
#  1) Random Background Augmentation
#     - 训练时每步以 50% 概率把背景从白色换成随机 RGB；GT 同步重合成。
#     - 强迫高斯学到正确的 alpha/几何，而不是把白底浮渣"印"进图像。
#     - eval/test 仍用白底，与 NeRF-Synthetic 标准一致。
#  2) PVD 弱化 + 推迟启动（5e-3 + 9600 起）
#     - 难场景早期 G/D 不平衡时 PVD 把训练带偏；到 9600 iter 几何稳了再开。
#  3) wider-pseudo 收紧 (extrap_t_range -0.3..1.3，半径不变)
#     - v7 的 -0.5..1.5 在难场景上让 PVD/coreg 在外推视角看到太离谱的几何。
#  4) Densify 提前关 + 收紧 floater safety_max_ratio
#     - refine_stop_iter 24000（v7 是 28800），floater max_ratio 0.15（v7 0.25）
#     - 难场景 v7 高斯爆炸到 1.4M+，需要早一点收手。
#
# 此外 ship/materials 单独把 model.sh_degree 降到 2（只到 2 阶 SH），
# 用更弱的颜色表达力换更稳的几何 / 减少 specular over-fit。
# ============================================================

data:
  random_background_aug:
    enabled: true
    prob: 0.5

model:
  # ship: 反射 + 复杂几何，3 阶 SH 容易把 specular 当成几何细节学进去。
  sh_degree: 2

train:
  iterations: 45000
  periodic_ckpt_every: 1500
  periodic_ckpt_start: 36000
  save_pre_prune_ckpt: true

strategy:
  refine_start_iter: 1200
  refine_stop_iter: 24000          # 早 4800 iter 关 densify
  prune:
    unseen:
      enabled: true
      start_iter: 4800
      every_iter: 7200
      stop_iter: 27600
    floater:
      enabled: true
      start_iter: 9600
      every_iter: 6000
      stop_iter: 27600
      alpha_thresh: 0.5
      thresh_bin: 0.05
      thresh_bin_end: 0.01
      thresh_bin_decay_start: 9600
      thresh_bin_decay_end: 27600
      safety_max_ratio: 0.15        # v7=0.25 -> 0.15，更守

dual_gs:
  coprune: true
  coprune_threshold: 0.05
  coprune_start_iter: 3600
  coprune_stop_iter: 27600
  coprune_every_iter: 1200
  safety_max_ratio: 0.20
  end_sample_pseudo: 45000

pseudo:
  wide_sampling:
    mode_probs: [0.3, 0.3, 0.4]
    extrap_t_range: [-0.3, 1.3]    # 收紧外推
    elevation_margin_deg: 20.0
    radius_jitter: 0.10

ssl:
  pvd:
    enabled: true
    start_iter: 9600                # v7=4800 -> 9600，推迟启动
    weight: 5.0e-3                  # v7=1.2e-2 -> 5e-3，弱化
    floater_guidance:
      warmup_iter: 14400
  depth_consist:
    # ship 的 depth prior 对反射/水面不可靠 → 降到 ×0.5
    weight: 0.025
