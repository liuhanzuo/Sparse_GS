experiment:
  name: ablation_ship_A2_conservative_prune

# Ablation A2：在 ship v7 x45k 之上只收紧 densify / floater prune，
# 其它（random_bg=off、PVD weight 与 v7 一致、wide_pseudo 与 v7 一致）不变。
# 用来回答：单纯压住 N（不让高斯爆到 1.4M）能带多少 PSNR 提升？

strategy:
  refine_stop_iter: 24000
  prune:
    floater:
      safety_max_ratio: 0.15
