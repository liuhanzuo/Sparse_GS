_base_: ../blender_drums_n8_w3_aggrprune_long_v7_widerpseudo_x45k.yaml

experiment:
  name: blender_drums_n8_v8_hard_x45k

# W3-aggrprune-long_v8_hard_x45k (drums)
# 同 ship/materials v8_hard：rand_bg + 弱 PVD + 收紧 wider_pseudo + 收紧 densify。
# drums 不是反射主导（鼓面是漫反射），所以：
#  - depth_consist 保持 default 0.05 (×1.0)，不去削弱。
#  - sh_degree 保持 base 默认 3 阶，不强制降级（drums 颜色细节多）。
# 仅依靠 random_bg + 收紧 densify + 弱 PVD 这三个变量来稳定训练。

data:
  random_background_aug:
    enabled: true
    prob: 0.5

# (no model.sh_degree override → 沿用 base 的 3)

train:
  iterations: 45000
  periodic_ckpt_every: 1500
  periodic_ckpt_start: 36000
  save_pre_prune_ckpt: true

strategy:
  refine_start_iter: 1200
  refine_stop_iter: 24000
  prune:
    unseen:
      enabled: true
      start_iter: 4800
      every_iter: 7200
      stop_iter: 27600
    floater:
      enabled: true
      start_iter: 9600
      every_iter: 6000
      stop_iter: 27600
      alpha_thresh: 0.5
      thresh_bin: 0.05
      thresh_bin_end: 0.01
      thresh_bin_decay_start: 9600
      thresh_bin_decay_end: 27600
      safety_max_ratio: 0.15

dual_gs:
  coprune: true
  coprune_threshold: 0.05
  coprune_start_iter: 3600
  coprune_stop_iter: 27600
  coprune_every_iter: 1200
  safety_max_ratio: 0.20
  end_sample_pseudo: 45000

pseudo:
  wide_sampling:
    mode_probs: [0.3, 0.3, 0.4]
    extrap_t_range: [-0.3, 1.3]
    elevation_margin_deg: 20.0
    radius_jitter: 0.10

ssl:
  pvd:
    enabled: true
    start_iter: 9600
    weight: 5.0e-3
    floater_guidance:
      warmup_iter: 14400
  # depth_consist: 保持 default weight=0.05，不覆盖
