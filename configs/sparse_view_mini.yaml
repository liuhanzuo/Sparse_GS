_base_: base.yaml

# Tiny synthetic scene generated by `python scripts/make_mini_dataset.py`.
# Lets us validate the full training loop end-to-end on any machine even
# before the real NeRF-Synthetic dataset is downloaded.

experiment:
  name: mini

data:
  scene: _mini
  n_train_views: 4              # out of 8 ring cameras
  image_downsample: 1

model:
  init:
    num_points: 20000
    extent: 1.0

train:
  iterations: 1500
  log_every: 100
  eval_every: 750
  save_every: 1500
  ssim_lambda: 0.2

strategy:
  refine_start_iter: 200
  refine_stop_iter: 1200
  reset_every: 600
  refine_every: 100

eval:
  num_test_renders: 4
