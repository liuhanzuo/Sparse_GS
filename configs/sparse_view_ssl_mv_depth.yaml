_base_: base.yaml

experiment:
  name: lego_n6_ssl_mv_depth

data:
  scene: lego
  n_train_views: 6
  # ---- monocular depth prior (in-process, no precompute needed) ----
  # The "alpha" backend derives a pseudo-disparity from the RGBA alpha
  # channel of NeRF-Synthetic images: foreground=1, background=0. Combined
  # with scale-shift-invariant matching this gives the model a free
  # silhouette / foreground prior at zero compute cost (no external model).
  #
  # For real-data scenes (DTU, Mip-NeRF-360, ...) where there's no alpha,
  # run scripts/precompute_depth.py with --backend transformers and switch
  # this block to:
  #     backend: cache
  #     tag: depth_anything_v2_small_hf
  depth_prior:
    enabled: true
    backend: alpha
    kind: disparity
    bg_value: 0.0

train:
  iterations: 7000
  ssim_lambda: 0.2

# Depth-consist: scale-shift-invariant L1 between rendered depth and
# the per-view monocular prior (here = alpha-derived disparity).
#
# Multi-view photo (v3 settings) is kept on as the primary geometric
# regulariser; depth_consist is the *new* term being introduced.
ssl:
  multiview_photo:
    enabled: true
    weight: 0.10
    start_iter: 1500
    n_neighbors: 1
    alpha_thresh: 0.5
    ssim_lambda: 0.0
    depth_eps: 0.001
    occlusion_check: true
    occlusion_start_iter: 3000
    occlusion_tau: 0.10
    occlusion_alpha_thresh: 0.3

  depth_consist:
    enabled: true
    weight: 0.05            # conservative; raise to 0.1 if it helps
    start_iter: 500         # depth has shape from the photo loss already
    alpha_thresh: 0.5
    space: disparity        # SSI matching in disparity (MiDaS convention)
    depth_eps: 0.001

  ema_teacher:     {enabled: false, weight: 0.0}
  pseudo_view:     {enabled: false, weight: 0.0}
  feature:         {enabled: false, weight: 0.0}
