_base_: ../_blender_n8/blender_chair_n8_dav2s.yaml

# DNGaussian-style depth SSL: global SSI + local patch SSI + depth-gradient consistency.
experiment:
  name: blender_chair_n8_ssl_mv_dav2s_depthv2

ssl:
  depth_consist:
    enabled: true
    weight: 0.05
    start_iter: 500
    alpha_thresh: 0.5
    space: disparity
    depth_eps: 0.001
    global_weight: 1.0
    local_weight: 0.5
    grad_weight: 0.2
    local_patch_size: 96
    local_n_patches: 8
