_base_: ../sparse_view_mini.yaml

experiment:
  name: _smoke_depthv2

data:
  depth_prior:
    enabled: true
    backend: alpha
    tag: alpha_depth
    kind: disparity
    required: false

train:
  iterations: 180
  log_every: 30
  eval_every: 90
  save_every: 180

strategy:
  refine_start_iter: 40
  refine_stop_iter: 120
  reset_every: 90
  refine_every: 40

ssl:
  depth_consist:
    enabled: true
    weight: 0.05
    start_iter: 10
    alpha_thresh: 0.1
    space: disparity
    depth_eps: 0.001
    global_weight: 1.0
    local_weight: 0.5
    grad_weight: 0.2
    local_patch_size: 32
    local_n_patches: 4

eval:
  num_test_renders: 4
