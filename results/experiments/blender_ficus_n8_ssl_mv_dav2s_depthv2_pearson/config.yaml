experiment:
  name: blender_ficus_n8_ssl_mv_dav2s_depthv2_pearson
  output_dir: outputs
  seed: 42
  device: cuda
data:
  type: nerf_synthetic
  root: D:\SSL\sparse_gs\data\nerf_synthetic
  scene: ficus
  n_train_views: 8
  train_view_ids: null
  image_downsample: 1
  white_background: true
  depth_prior:
    enabled: true
    backend: cache
    tag: depth_anything_v2_small
    kind: disparity
    required: false
model:
  sh_degree: 3
  init:
    type: random_in_box
    num_points: 100000
    extent: 1.5
    rgb_init: 0.5
  scale_init_factor: 0.01
renderer:
  near_plane: 0.01
  far_plane: 1.0e10
  rasterize_mode: antialiased
  packed: false
  absgrad: true
  render_mode: RGB+ED
strategy:
  type: default
  prune_opa: 0.005
  grow_grad2d: 0.0002
  grow_scale3d: 0.01
  prune_scale3d: 0.1
  refine_start_iter: 500
  refine_stop_iter: 15000
  refine_every: 100
  reset_every: 3000
  absgrad: true
  revised_opacity: false
  verbose: false
optim:
  means_lr: 0.00016
  scales_lr: 0.005
  quats_lr: 0.001
  opacities_lr: 0.05
  sh0_lr: 0.0025
  shN_lr: 0.000125
  means_lr_final_factor: 0.01
  eps: 1.0e-15
train:
  iterations: 7000
  batch_size: 1
  shuffle: true
  log_every: 50
  eval_every: 2000
  save_every: 7000
  ssim_lambda: 0.2
ssl:
  multiview_photo:
    enabled: true
    weight: 0.1
    start_iter: 1500
    n_neighbors: 1
    alpha_thresh: 0.5
    ssim_lambda: 0.0
    depth_eps: 0.001
    occlusion_check: true
    occlusion_start_iter: 3000
    occlusion_tau: 0.1
    occlusion_alpha_thresh: 0.3
  depth_consist:
    enabled: true
    weight: 1.0
    start_iter: 500
    alpha_thresh: 0.5
    space: disparity
    depth_eps: 0.001
    mode: both
    depthv2_weight: 0.05
    pearson_weight: 0.05
    global_weight: 1.0
    local_weight: 0.5
    grad_weight: 0.2
    local_patch_size: 96
    local_n_patches: 8
  pseudo_view:
    enabled: false
    weight: 0.0
    start_sample_pseudo: 2000
    end_sample_pseudo: 6650
    sample_pseudo_interval: 1
  feature:
    enabled: false
    weight: 0.0
  ema_teacher:
    enabled: false
    momentum: 0.995
    weight: 0.0
  patch_gan:
    enabled: false
    weight: 0.0
eval:
  render_test_at_end: true
  num_test_renders: 200
  lpips: true
  lpips_net: vgg
