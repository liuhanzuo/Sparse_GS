experiment:
  name: lego_n6_ssl_v4
  output_dir: outputs
  seed: 42
  device: cuda
data:
  type: nerf_synthetic
  root: D:\SSL\sparse_gs\data\nerf_synthetic
  scene: lego
  n_train_views: 6
  train_view_ids: null
  image_downsample: 1
  white_background: true
model:
  sh_degree: 3
  init:
    type: random_in_box
    num_points: 100000
    extent: 1.5
    rgb_init: 0.5
  scale_init_factor: 0.01
renderer:
  near_plane: 0.01
  far_plane: 1.0e10
  rasterize_mode: antialiased
  packed: false
  absgrad: true
  render_mode: RGB+ED
strategy:
  type: default
  prune_opa: 0.005
  grow_grad2d: 0.0002
  grow_scale3d: 0.01
  prune_scale3d: 0.1
  refine_start_iter: 500
  refine_stop_iter: 15000
  refine_every: 100
  reset_every: 3000
  absgrad: true
  revised_opacity: false
  verbose: false
optim:
  means_lr: 0.00016
  scales_lr: 0.005
  quats_lr: 0.001
  opacities_lr: 0.05
  sh0_lr: 0.0025
  shN_lr: 0.000125
  means_lr_final_factor: 0.01
  eps: 1.0e-15
train:
  iterations: 7000
  batch_size: 1
  shuffle: true
  log_every: 50
  eval_every: 2000
  save_every: 7000
  ssim_lambda: 0.2
ssl:
  multiview_photo:
    enabled: false
    weight: 0.0
  depth_consist:
    enabled: false
    weight: 0.0
  pseudo_view:
    enabled: true
    weight: 0.05
    start_iter: 5000
    ssim_lambda: 0.1
    t_range:
    - 0.3
    - 0.7
    alpha_thresh: 0.5
    detach_geometry: true
  feature:
    enabled: false
    weight: 0.0
  ema_teacher:
    enabled: true
    momentum: 1.0
    weight: 0.02
    snapshot_every: 2000
    build_iter: 4500
    start_iter: 5000
    ssim_lambda: 0.0
eval:
  render_test_at_end: true
  num_test_renders: 8
